name: CI/CD to Cloud Run

on:
  push:
    branches:
      - master

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west1
  SERVICE_NAME: ks-portfolio
  REPOSITORY: ks-portfolio-repo

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Google Auth
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: 'projects/172422924650/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider'
        service_account: 'github-deployer@festive-dolphin-483819-i1.iam.gserviceaccount.com'

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Authorize Docker
      run: |
        gcloud auth configure-docker europe-west1-docker.pkg.dev

    - name: Build and Push Container
      run: |
        DOCKER_TAG="europe-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
        
        docker build \
          --build-arg NEXT_PUBLIC_RECAPTCHA_SITE_KEY="${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}" \
          --build-arg VITE_FIREBASE_API_KEY="${{ secrets.VITE_FIREBASE_API_KEY }}" \
          --build-arg VITE_FIREBASE_AUTH_DOMAIN="${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" \
          --build-arg VITE_FIREBASE_PROJECT_ID="${{ secrets.VITE_FIREBASE_PROJECT_ID }}" \
          --build-arg VITE_FIREBASE_APP_ID="${{ secrets.VITE_FIREBASE_APP_ID }}" \
          --build-arg VITE_API_URL="/api" \
          -t $DOCKER_TAG .
        docker push $DOCKER_TAG

    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy ${{ env.SERVICE_NAME }} \
          --image "europe-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}" \
          --region ${{ env.REGION }} \
          --platform managed \
          --allow-unauthenticated \
          --update-secrets=LOKI_USERNAME=LOKI_USERNAME:latest,SLACK_BOT_TOKEN=SLACK_BOT_TOKEN:latest,RECAPTCHA_SECRET_KEY=RECAPTCHA_SECRET_KEY:latest,QDRANT_URL=QDRANT_URL:latest,LOKI_HOST=LOKI_HOST:latest,SLACK_CHANNEL_ID=SLACK_CHANNEL_ID:latest,SLACK_SIGNING_SECRET=SLACK_SIGNING_SECRET:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,ADMIN_SECRET=ADMIN_SECRET:latest,LOKI_PASSWORD=LOKI_PASSWORD:latest,QDRANT_API_KEY=QDRANT_API_KEY:latest,GRAFANA_METRICS_USER=GRAFANA_METRICS_USER:latest,GRAFANA_METRICS_PASSWORD=GRAFANA_METRICS_PASSWORD:latest,GRAFANA_REMOTE_WRITE_URL=GRAFANA_REMOTE_WRITE_URL:latest,GMAIL_CLIENT_ID=GMAIL_CLIENT_ID:latest,GMAIL_CLIENT_SECRET=GMAIL_CLIENT_SECRET:latest,GMAIL_REFRESH_TOKEN=GMAIL_REFRESH_TOKEN:latest,USEME_POLL_TOKEN=USEME_POLL_TOKEN:latest,USEME_USER_SKILLS=USEME_USER_SKILLS:latest